<!-- Team member  -->
<div class="team-members">
{% for member in module.members %}
  <div class="team-member">
    <h2>{{ member.member_name|sanitize_html }}</h2>
    <img src="{{ module.image.src }}" alt="{{ module.image.alt }}" class="team-image">
    {% if member.position %}
      {{ member.position|sanitize_html }}
    {% endif %}
  </div>
{% endfor %}
</div>
